<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarvaShop - Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --pink: #ff6b81;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --border: #ececec;
            --bg-soft: #fdf0ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #fff;
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        /* --- HEADER --- */
        .page-header {
            background: var(--bg-soft);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 15px;
        }

        /* --- PROFILE FORM CONTAINER --- */
        .profile-wrapper {
            max-width: 700px;
            margin: -50px auto 0; /* Pulls form up into the soft background */
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        /* --- AVATAR EDIT --- */
        .avatar-section {
            position: relative;
            width: 120px;
            margin: 0 auto 40px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--pink);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 45px;
            font-weight: 800;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.2);
        }

        .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--text-dark);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #fff;
            transition: 0.3s;
        }

        .upload-btn:hover { background: var(--pink); }

        /* --- FORM STYLING --- */
        .section-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--pink);
            margin-bottom: 25px;
            border-bottom: 2px solid var(--bg-soft);
            padding-bottom: 10px;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            background: #fcfcfc;
        }

        input:focus, textarea:focus {
            border-color: var(--pink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 107, 129, 0.1);
        }

        textarea { resize: none; height: 100px; }

        /* --- BUTTONS --- */
        .actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-cancel { background: #f1f1f1; color: var(--text-light); }
        .btn-save { background: var(--pink); color: #fff; }

        .btn-save:hover { background: var(--text-dark); transform: translateY(-2px); }

        /* Mobile View */
        @media (max-width: 600px) {
            .grid-form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .profile-wrapper { padding: 25px; margin-top: -30px; border-radius: 20px; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>My Settings</h1>
        <p>Update your personal information and address</p>
    </div>

    <div class="profile-wrapper">
        <form>
            <div class="avatar-section">
                <div class="profile-pic">M</div>
                <label class="upload-btn">
                    <i class="fas fa-camera"></i>
                    <input type="file" style="display: none;">
                </label>
            </div>

            <h3 class="section-title">Personal Details</h3>
            <div class="grid-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" value="Mrunali Thakur">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="mrunali_26">
                </div>
            </div>

            <h3 class="section-title">Contact Information</h3>
            <div class="grid-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="mrunali.thakur@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" value="+91 98765 43210">
                </div>
            </div>

            <h3 class="section-title">Shipping Address</h3>
            <div class="grid-form">
                <div class="form-group full-width">
                    <label>Street Address</label>
                    <textarea placeholder="Flat No, Building Name, Street..."></textarea>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" placeholder="Mumbai">
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" placeholder="400001">
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn btn-cancel">Discard Changes</button>
                <button type="submit" class="btn btn-save">Save Profile</button>
            </div>
        </form>
    </div>

</body>
</html>
